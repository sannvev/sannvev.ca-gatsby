# Auto-deploy Gatsby build to OVHcloud Web Hosting via SFTP.
# Disabled by default — rename from .yml.disabled when ready, and set repo secrets:
#   OVH_SFTP_HOST     e.g. ftp.cluster0XX.hosting.ovh.net
#   OVH_SFTP_USER     SFTP username from OVH control panel
#   OVH_SFTP_KEY      Private SSH key (content, not path); paired public key added on OVH
#   OVH_REMOTE_PATH   e.g. /home/<user>/www
name: Deploy to OVHcloud

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: https://sannvev.ca

      - name: Deploy public/ via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.OVH_SFTP_USER }}
          server: ${{ secrets.OVH_SFTP_HOST }}
          ssh_private_key: ${{ secrets.OVH_SFTP_KEY }}
          local_path: "./public/*"
          remote_path: ${{ secrets.OVH_REMOTE_PATH }}
          delete_remote_files: true
